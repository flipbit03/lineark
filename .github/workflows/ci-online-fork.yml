name: "Tests (Online — Fork PRs)"

# Runs on the base branch context, so secrets are available.
# Triggered when a maintainer adds the 'safe-to-test' label after reviewing the fork code.
on:
  pull_request_target:
    types: [labeled]

permissions:
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  test-online:
    name: Tests (Online)
    # Share the same concurrency group as the main CI online tests — only one
    # online test run at a time across all workflows, to avoid resource conflicts.
    concurrency:
      group: linear-online-tests
      cancel-in-progress: false
    runs-on: ubuntu-latest
    if: >-
      github.event.label.name == 'safe-to-test'
      && github.event.pull_request.head.repo.full_name != github.repository
    steps:
      - uses: actions/checkout@v6
        with:
          # Check out the fork's PR code, not the base branch
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: test-online-fork-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: test-online-fork-cargo-

      - name: Set up test API token
        run: echo "$LINEAR_TEST_TOKEN" > ~/.linear_api_token_test
        env:
          LINEAR_TEST_TOKEN: ${{ secrets.LINEAR_TEST_TOKEN }}

      - name: Clean test workspace
        run: cargo run -p lineark-test-utils --bin cleanup-test-workspace

      - name: Run online tests
        # See ci.yml comment — Linear's API has a transient cold-start
        # failure on `*Create` mutations; wrap in 3x retry to absorb it.
        # `continue-on-error: true` keeps a bad Linear day from blocking
        # fork PRs; failures are still visible in the job log.
        continue-on-error: true
        run: |
          for attempt in 1 2 3; do
            echo ">>> online attempt $attempt/3"
            if cargo test --workspace --test online -- --test-threads=1; then
              echo ">>> online passed on attempt $attempt"
              exit 0
            fi
            echo ">>> online attempt $attempt failed; cleaning workspace before retry"
            cargo run -p lineark-test-utils --bin cleanup-test-workspace || true
            sleep 30
          done
          echo ">>> online failed after 3 attempts"
          exit 1

      - name: Clean test workspace (post)
        if: always()
        run: cargo run -p lineark-test-utils --bin cleanup-test-workspace

      - name: Remove safe-to-test label
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                name: 'safe-to-test'
              });
            } catch (e) {
              console.log(`Failed to remove label: ${e.message}`);
            }
